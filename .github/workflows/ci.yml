name: CI/CD Pipeline

on:
  push:
    branches: [ main, master, development, stage ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run tests
        run: pytest || true

  sast:
    runs-on: ubuntu-latest
    needs: build-and-test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install Bandit
        run: pip install bandit
      - name: Run Bandit
        run: bandit -r . -f json -o bandit-report.json || true
      - name: Upload Bandit report
        uses: actions/upload-artifact@v4
        with:
          name: bandit-report
          path: bandit-report.json

  sca:
    runs-on: ubuntu-latest
    needs: build-and-test
    steps:
      - uses: actions/checkout@v4
      - name: Run Dependency-Check
        uses: dependency-check/Dependency-Check_Action@main
        with:
          project: 'TaskManager'
          path: '.'
          format: 'JSON'
      - name: Upload Dependency-Check report
        uses: actions/upload-artifact@v4
        with:
          name: depcheck-report
          path: reports
dast-info:
    runs-on: ubuntu-latest
    needs: build-and-test
    steps:
      - name: DAST Note
        run: echo "DAST executado manualmente com OWASP ZAP (zap-baseline.py) contra ambiente local. Ver relatório no documento final."

  monitoring-info:
    runs-on: ubuntu-latest
    needs: build-and-test
    steps:
      - name: Monitoring Note
        run: echo "Monitoramento configurado com Prometheus (porta 9090). Ver evidencias no relatorio final."
